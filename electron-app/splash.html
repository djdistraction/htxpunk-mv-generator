<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Starting…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d1b4e 100%);
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    -webkit-user-select: none;
  }
  .logo { font-size: 40px; }
  .spinner {
    width: 30px;
    height: 30px;
    border: 3px solid rgba(255, 255, 255, 0.2);
    border-top-color: #ec4899;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  #status {
    font-size: 13px;
    color: #ccc;
    text-align: center;
    padding: 0 30px;
    max-width: 420px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="logo">🎬</div>
  <div class="spinner"></div>
  <div id="status">Starting HTXpunk MV Generator…</div>
  <script>
    if (window.electron && window.electron.onSplashStatus) {
      window.electron.onSplashStatus((msg) => {
        document.getElementById('status').textContent = msg;
      });
    }
  </script>
</body>
</html>
