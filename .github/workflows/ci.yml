name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (compile, imports, tests)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11: CLAUDE.md's stated minimum. 3.13: aeneas's setup.py needs
        # numpy.distutils, which NumPy removes entirely on Python >= 3.12 —
        # this matrix entry is what would have caught that before it shipped.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install espeak-ng and ffmpeg (lyric forced alignment)
        # ffmpeg provides ffprobe — not guaranteed present on the runner
        # image, and the bundled imageio-ffmpeg package only ships ffmpeg.
        run: sudo apt-get update && sudo apt-get install -y espeak-ng ffmpeg
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Prepare environment for aeneas
        working-directory: backend
        run: python scripts/prepare_aeneas_install.py
      - name: Install aeneas (lyric forced alignment)
        working-directory: backend
        env:
          AENEAS_WITH_CEW: "False"
          AENEAS_WITH_CDTW: "False"
          AENEAS_WITH_CMFCC: "False"
        # --no-build-isolation: aeneas's setup.py needs numpy (just
        # installed above) visible to import, which pip's isolated build
        # env otherwise hides — see requirements-aeneas.txt for the details.
        run: pip install --no-build-isolation -r requirements-aeneas.txt
      - name: Compile check (catches syntax errors)
        working-directory: backend
        run: |
          find . -name "*.py" -not -path "./tests/*" | xargs python -m py_compile
      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit -p tsconfig.json

  windows:
    name: Windows (path/filesystem-sensitive checks)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Prepare environment for aeneas
        working-directory: backend
        run: python scripts/prepare_aeneas_install.py
      - name: Install aeneas (lyric forced alignment)
        working-directory: backend
        env:
          AENEAS_WITH_CEW: "False"
          AENEAS_WITH_CDTW: "False"
          AENEAS_WITH_CMFCC: "False"
        run: pip install --no-build-isolation -r requirements-aeneas.txt
      - name: Run Windows-sensitive tests
        working-directory: backend
        run: python -m pytest tests/test_windows_paths.py -v
