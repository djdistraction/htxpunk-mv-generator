name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (compile, imports, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install espeak-ng (lyric forced alignment)
        run: sudo apt-get update && sudo apt-get install -y espeak-ng
      - name: Install dependencies
        working-directory: backend
        env:
          AENEAS_WITH_CEW: "False"
          SETUPTOOLS_USE_DISTUTILS: "stdlib"
        run: pip install -r requirements.txt
      - name: Compile check (catches syntax errors)
        working-directory: backend
        run: |
          find . -name "*.py" -not -path "./tests/*" | xargs python -m py_compile
      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit -p tsconfig.json

  windows:
    name: Windows (path/filesystem-sensitive checks)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        env:
          AENEAS_WITH_CEW: "False"
          SETUPTOOLS_USE_DISTUTILS: "stdlib"
        run: pip install -r requirements.txt
      - name: Run Windows-sensitive tests
        working-directory: backend
        run: python -m pytest tests/test_windows_paths.py -v
